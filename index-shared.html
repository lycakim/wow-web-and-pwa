<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barkada Planner</title>
    <link rel="icon" href="/favicon.ico" />
    <script>
      (function () {
        const stored = localStorage.getItem('barkada-dark');
        const dark = stored ? stored === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/resources/js/barkada-shared.tsx"></script>
  </body>
</html>
